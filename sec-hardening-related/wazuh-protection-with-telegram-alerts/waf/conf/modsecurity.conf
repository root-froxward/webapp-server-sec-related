## ModSecurity main configuration
## Part of wazuh-protection-suite/waf
## Works with both libmodsecurity3 (nginx) and mod_security2 (apache)

SecRuleEngine On

# -- Request body handling --
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject
SecRequestBodyJsonDepthLimit 512

# -- Response body (off by default, enable if you need data leak detection) --
SecResponseBodyAccess Off

# -- Temp and data dirs --
SecTmpDir /tmp/modsecurity/tmp
SecDataDir /tmp/modsecurity/data
SecUploadDir /tmp/modsecurity/upload
SecUploadKeepFiles Off

# -- Audit log --
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec_audit.log

# -- Debug log (0 = off, 9 = max) --
SecDebugLog /var/log/modsec_debug.log
SecDebugLogLevel 0

# -- Misc --
SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile unicode.mapping 20127
SecStatusEngine On

# -- Rule tweaks --
# Bump anomaly scoring thresholds slightly to reduce false positives
# on fresh installs. Tighten after tuning.
SecAction \
    "id:900110,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=10,\
    setvar:tx.outbound_anomaly_score_threshold=8"

# Paranoia level: 1 = balanced, 2 = moderate, 3 = strict, 4 = max
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.paranoia_level=2"

# Block on anomaly
SecAction \
    "id:900120,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.blocking_early=1"

# -- Custom rules appended below by installer --
