# GeoIP country blocking configuration
# One ISO 3166-1 alpha-2 country code per line
# Lines starting with # are ignored
#
# Mode is set in install-waf.sh:
#   GEOIP_MODE=deny  -> block listed countries, allow the rest
#   GEOIP_MODE=allow -> allow listed countries, block the rest
#
# Examples:
# CN
# RU
# KP
# IR
